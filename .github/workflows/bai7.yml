name: Automated Code Review

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Bai9.7/**'
      - '.github/workflows/bai7.yml'

jobs:
  checkstyle-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Quan trọng để Action có thể comment vào PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        working-directory: Bai9.7
        run: mvn checkstyle:checkstyle

      - name: Post Inline Feedback
        if: failure() # Chỉ chạy nếu bước Run Checkstyle phát hiện lỗi
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkstyle_config: google_checks.xml
          workdir: Bai9.7
          level: error