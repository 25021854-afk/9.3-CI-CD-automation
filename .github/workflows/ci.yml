name: Java CI for Bai 9.3

on:
  push:
    paths:
      - 'Bai9.3 CI,CD automation/**' # Chỉ chạy khi có thay đổi trong bài 9.3
    branches: [ main ]
  pull_request:
    paths:
      - 'Bai9.3 CI,CD automation/**'
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # Bắt buộc phải có dòng này vì pom.xml nằm trong thư mục con
      working-directory: "Bai9.3 CI,CD automation" 
      run: mvn clean package

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Bai9.3-Artifact
        path: "Bai9.3 CI,CD automation/target/*.jar"